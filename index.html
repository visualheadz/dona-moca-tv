<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dona Moça TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DONA MOÇA TV  ·  Recepção · Samsung Tizen
   Identidade Fase 2/3 — ébano, terracota, areia, Cormorant, Jost

   ------------------------------------------------------------
   GUIA DE IMAGENS POR CARD  (briefing para o fotógrafo/designer)
   Direção: manhã editorial · luz lateral dourada 6h–9h · sombras
   longas · LUT da marca (sombras avermelhadas, highlights em areia,
   verde dessaturado) · pessoas de costas ou ausentes, nunca posando.
   Nunca: filtro frio, HDR, saturação excessiva, logo sobre a foto.
   Coloque os arquivos na MESMA pasta do index.html e use só o nome.

   • Abertura ....... sem foto (card do wordmark). Só a flor textura.
   • Maré ........... sem foto (legibilidade dos números). Fundo areia.
   • Tempo .......... sem foto (legibilidade). Fundo ébano.
   • A ilha (gira) — uma foto por dica:
       ilha-farol.jpg .... vista do alto ao entardecer, silhueta da
                           ilha, luz baixa, horizonte limpo.
       ilha-gamboa.jpg ... areia exposta na maré baixa, manguezal,
                           figura de costas ao longe ou ninguém.
       ilha-pordosol.jpg . sol caindo no Atlântico, rochas, contraluz.
       ilha-praias.jpg ... mar calmo, piscina natural, barco distante.
   • Alma da casa (gira) — uma foto por curiosidade:
       baiana-samba.jpg .. saia rodada / pandeiro em movimento,
                           sem rosto posado, grão e calor.
       baiana-hibisco.jpg  close do hibisco vermelho, luz lateral,
                           casa desfocada ao fundo.
       baiana-acaraje.jpg  tabuleiro da baiana, dendê, detalhe, fim
                           de tarde, cor quente.
       baiana-anfitria.jpg gesto de acolhimento: mão entregando a
                           chave, flor sobre a cama — sem rosto.
   • Fotos da casa (giram entre os cards):
       foto-piscina.jpg .. borda infinita ao amanhecer, mar ao fundo.
       foto-praia.jpg .... Primeira Praia de manhã, luz lateral.
       foto-quarto.jpg ... quarto frente-mar, cortina ao vento, cama
                           preservada, sem cara de "cama de rede".
   ------------------------------------------------------------
   Edite e salve sempre em UTF-8.
   ============================================================ */

:root{
  --ebano:#1E1510;      --terra-escuro:#7D3A1F;  --terracota:#B05A30;
  --terra-claro:#D4896A;--terra-palido:#EDC5B0;  --areia:#F0E0CC;
  --creme:#FAF5EE;      --cinza:#888078;         --verde:#2E5E52;
  --nevoa:#A8C5BC;
  --display:'Cormorant Garamond', Georgia, serif;
  --util:'Jost', 'Helvetica Neue', Arial, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}

#stage{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(100vw,177.78vh);height:min(56.25vw,100vh);
  background:var(--ebano);overflow:hidden;font-size:clamp(10px,1.46vw,28px);}

/* ---------- Barra superior ---------- */
.topbar{position:absolute;top:0;left:0;right:0;height:3.2em;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2.6em;pointer-events:none;}
.handle{font-family:var(--util);font-weight:200;color:var(--verde);
  font-size:.62em;letter-spacing:.42em;text-transform:uppercase;}
.clock{font-family:var(--util);font-weight:200;font-size:.62em;
  letter-spacing:.34em;text-transform:uppercase}
.topbar.on-dark .clock{color:var(--areia)}
.topbar.on-light .clock{color:var(--cinza)}

/* ---------- Flor textura ---------- */
.flor{position:absolute;z-index:1;pointer-events:none;opacity:.08;filter:saturate(.9)}
.flor svg{display:block;width:100%;height:100%}

/* ---------- Card base ---------- */
.card{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;
  justify-content:center;padding:0 7em;opacity:0;visibility:hidden;
  transition:opacity 1.2s ease;}
.card.active{opacity:1;visibility:visible}
.card.dark{background:var(--ebano);color:var(--areia)}
.card.cream{background:var(--creme);color:var(--ebano)}
.card.sand{background:var(--areia);color:var(--ebano)}

.eyebrow{font-family:var(--util);font-weight:200;font-size:.62em;
  letter-spacing:.46em;text-transform:uppercase;margin-bottom:1.6em;}
.card.dark .eyebrow{color:var(--terra-claro)}
.card.cream .eyebrow,.card.sand .eyebrow{color:var(--terracota)}

/* ---------- 1 · Abertura ---------- */
#c-abertura .saudacao{font-family:var(--display);font-style:italic;font-weight:300;
  font-size:5.4em;line-height:.98;color:var(--terra-claro);}
#c-abertura .wordmark{margin:.5em 0 .7em}
#c-abertura .linha{font-family:var(--display);font-style:italic;font-weight:300;
  font-size:1.9em;color:var(--areia);max-width:18em;line-height:1.3;}
.wordmark-type{display:flex;flex-direction:column;line-height:.84}
.wordmark-type span{font-family:var(--display);font-weight:300;font-style:italic;
  font-size:3.2em;letter-spacing:.02em}
.wordmark-type .dona{color:var(--terra-claro)}
.wordmark-type .moca{color:var(--areia)}

#wordmark-slot .wm{width:13em;height:auto;display:block}

/* ---------- 2 · Maré ---------- */
#c-mare{padding:0}
.mare-wrap{width:100%;height:100%;padding:0 7em;display:flex;flex-direction:column;
  justify-content:center;position:relative;z-index:2}
.mare-wrap .eyebrow{text-align:center;margin-bottom:.2em}
.mare-grid{display:flex;width:100%;margin-top:1.4em}
.mare-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:.5em;
  padding:0 1.5em;position:relative}
.mare-col + .mare-col::before{content:'';position:absolute;left:0;top:8%;height:84%;
  width:1px;background:rgba(176,90,48,.18)}
.mare-tag{font-family:var(--util);font-weight:300;font-size:.64em;letter-spacing:.3em;
  text-transform:uppercase;color:var(--terracota);display:flex;align-items:center;gap:.5em}
.mare-tag .arrow{font-size:1.15em;line-height:1}
.mare-hora{font-family:var(--display);font-style:italic;font-weight:300;font-size:4.4em;
  line-height:1;color:var(--ebano)}
.mare-alt{font-family:var(--util);font-weight:300;font-size:.66em;letter-spacing:.18em;
  color:var(--cinza)}
.mare-nota{font-family:var(--display);font-style:italic;font-size:1.6em;color:var(--terra-escuro);
  margin-top:2.6em;max-width:32em;line-height:1.35;text-align:center;align-self:center}
.mare-fonte{font-family:var(--util);font-weight:200;font-size:.5em;letter-spacing:.22em;
  text-transform:uppercase;color:var(--cinza);position:absolute;bottom:2.4em;left:0;right:0;
  text-align:center}

/* ---------- 3 · Tempo ---------- */
#c-tempo{padding:0}
.tempo-wrap{display:flex;align-items:center;justify-content:space-between;
  width:100%;height:100%;padding:0 7em;gap:4em;position:relative;z-index:2}
.tempo-agora{flex:0 1 auto;display:flex;flex-direction:column;justify-content:center}
.tempo-main{display:flex;align-items:center;gap:.35em;margin-top:.15em}
.icon-now{width:3.6em;height:3.6em;color:var(--terra-claro);flex:0 0 auto}
.icon-now svg,.fc-ico svg{width:100%;height:100%;display:block}
.temp-now{font-family:var(--display);font-style:italic;font-weight:300;font-size:10em;
  line-height:.78;color:var(--areia)}
.temp-now .deg{font-size:.38em;vertical-align:top;color:var(--terra-palido)}
.temp-cond{font-family:var(--display);font-style:italic;font-size:2.5em;
  color:var(--terra-claro);margin-top:.35em}
.temp-frase{font-family:var(--display);font-style:italic;font-size:1.35em;
  color:var(--nevoa);margin-top:.5em;max-width:18em;line-height:1.3}
.temp-meta{font-family:var(--util);font-weight:200;font-size:.6em;letter-spacing:.26em;
  text-transform:uppercase;color:var(--cinza);margin-top:1.5em}
.tempo-fc{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-start;
  padding-left:5em;border-left:1px solid rgba(237,197,176,.20)}
.tempo-fc .eyebrow{color:var(--terra-palido);margin-bottom:1.2em}
.forecast{display:flex}
.fc{display:flex;flex-direction:column;align-items:center;gap:1em;
  padding:0 2.4em;position:relative}
.fc + .fc::before{content:'';position:absolute;left:0;top:10%;height:80%;width:1px;
  background:rgba(237,197,176,.16)}
.fc-dia{font-family:var(--util);font-weight:300;font-size:.62em;letter-spacing:.34em;
  text-transform:uppercase;color:var(--terra-palido)}
.fc-ico{width:2.4em;height:2.4em;color:var(--nevoa)}
.fc-temp{font-family:var(--display);font-style:italic;font-size:2.1em;color:var(--areia);
  display:flex;flex-direction:column;align-items:center;line-height:1.02}
.fc-temp .min{color:var(--cinza);font-size:.62em}

/* ---------- 4 · Ilha / 5 · Baiana (com slot de foto) ---------- */
.editorial{padding:0}
.editorial .ed-content{position:relative;z-index:2;padding:0 7em;width:100%}
.editorial .ed-bg,.editorial .ed-ov{position:absolute;inset:0;z-index:0;opacity:0;
  transition:opacity .9s ease}
.editorial.has-photo .ed-bg{opacity:1;background-size:cover;background-position:center;
  transform:scale(1.05)}
.editorial.has-photo.active .ed-bg{animation:kenburns 18s ease-out forwards}
.editorial.has-photo .ed-ov{opacity:1;background:linear-gradient(0deg,
  rgba(30,21,16,.84) 0%, rgba(30,21,16,.50) 46%, rgba(30,21,16,.34) 100%)}
.editorial .titulo{font-family:var(--display);font-style:italic;font-weight:300;
  font-size:3.4em;line-height:1.06;color:var(--ebano);max-width:15em}
.editorial.dark .titulo{color:var(--areia)}
.editorial .corpo{font-family:var(--util);font-weight:300;font-size:.92em;line-height:1.7;
  letter-spacing:.02em;color:var(--terra-escuro);max-width:26em;margin-top:1.4em}
.editorial.dark .corpo{color:var(--nevoa)}
/* quando tem foto, texto sempre claro sobre o escurecido */
.editorial.has-photo .titulo{color:var(--creme)}
.editorial.has-photo .corpo{color:var(--nevoa)}
.editorial.has-photo .eyebrow{color:var(--terra-palido)}

/* ---------- Cards de FOTO ---------- */
.card.photo-card{padding:0}
.photo-bg{position:absolute;inset:0;background-size:cover;background-position:center;
  transform:scale(1.05);will-change:transform;}
.photo-card.active .photo-bg{animation:kenburns 18s ease-out forwards}
@keyframes kenburns{0%{transform:scale(1.05) translate(0,0)}
  100%{transform:scale(1.14) translate(-1.5%,-1.5%)}}
.photo-ov{position:absolute;inset:0;background:linear-gradient(0deg,
  rgba(30,21,16,.80) 0%, rgba(30,21,16,.18) 42%, rgba(30,21,16,0) 70%);}
.photo-cap{position:absolute;left:7em;bottom:4.6em;z-index:11;max-width:20em}
.photo-cap .eyebrow{color:var(--terra-palido)}
.photo-cap .frase{font-family:var(--display);font-style:italic;font-weight:300;
  font-size:2.7em;line-height:1.16;color:var(--creme);max-width:17em}
@media (prefers-reduced-motion:reduce){
  .photo-card.active .photo-bg,.editorial.has-photo.active .ed-bg{animation:none}
  .card{transition:none}
}

/* ---------- Progresso ---------- */
.dots{position:absolute;bottom:2.2em;left:50%;transform:translateX(-50%);z-index:60;
  display:flex;gap:.7em}
.dot{width:.34em;height:.34em;border-radius:50%;background:rgba(136,128,120,.4);
  transition:background .4s,transform .4s}
.dot.on{background:var(--terracota);transform:scale(1.35)}
</style>
</head>
<body>
<div id="stage">

  <div class="topbar on-dark" id="topbar">
    <div class="handle">@pousadadonamoca</div>
    <div class="clock" id="clock">—</div>
  </div>

  <!-- 1 · ABERTURA -->
  <section class="card dark active" id="c-abertura">
    <div class="flor" style="width:42em;height:42em;right:-9em;bottom:-11em;opacity:.07" data-flor></div>
    <div class="saudacao" id="saudacao">Bom dia</div>
    <div class="wordmark" id="wordmark-slot">

.68-.29,55.69C.06,217.35,0,231.88,0,241.29c0,7.46,17.3,6.86,17.31-.62.02-30.16-12.77-52.55-2.28-85.21,20.23,16.62,27.24,29.45,37.02,46.61,4.72,8.28,9.75-1.16,10.12-1.72,6.75-10.24,15.29-34.76,27.01-36.95-1.83,29.36-10.6,55.49,2.79,78.28,5.05,8.59,14.03,4.33,12.41-2.95-7.52-33.61-.21-69.38,0-103.47Z"/><path fill="#F0E0CC" d="M206.06,165.38c-15.31,7.64-20.7,32-19.17,48.41,1.42,15.2,9.63,29.18,25.04,31.82,12.57,2.15,35.67,3.36,37.12-14.34.61-7.43-9.07-4.06-13.05,2.12-1.19,1.85-24.68.89-35.28-23.23-15.97-36.37,23.14-42.43,33.41-23.61,3.54,6.5,21.31-6.05,16.91-11.87,0,0-19.41-22.07-44.99-9.3Z"/><path fill="#F0E0CC" d="M138.87,28.3c-21.42,1.54-34.19,32.75-34.19,46.66,0,12.63,11.56,38.73,37.87,38.73,14.24,0,31.65-21.33,32.1-40.37,0-21.34-21.52-46.05-35.79-45.02ZM139.71,106.09c-7.05-1.13-35.25-37.4-.23-62.01.39-.28,18.4,8.52,17.63,31.83-.32,9.7-10.51,31.29-17.4,30.19Z"/><path fill="#F0E0CC" d="M143.65,161.49c-21.47.04-34.19,32.75-34.19,46.66,0,12.63,11.56,38.73,37.87,38.73,14.24,0,34.02-21.62,34.47-40.66,0-21.34-21.01-44.76-38.16-44.73ZM146.82,238.73c-11.76-.96-32.32-38.5-.32-63.08.38-.29,18.58,9.43,17.82,32.74-.32,9.7-11.57,30.82-17.5,30.34Z"/><path fill="#F0E0CC" d="M218.68,255.05c-1.12,3.11-7.38,8.48-9.43,7.23-2.1-1.28-6.99-16.67,7.17-19.89.16-.04.3-.08.44-.13.85.85,3.49,8.16,1.83,12.79Z"/></svg>
    </div>
    <div class="linha">Primeira Praia. Nove quartos, todos de frente para o mar.</div>
  </section>

  <!-- 2 · MARÉ -->
  <section class="card cream" id="c-mare">
    <div class="flor" style="width:30em;height:30em;left:-7em;top:-8em;opacity:.06" data-flor></div>
    <div class="mare-wrap">
      <div class="eyebrow">A maré hoje</div>
      <div class="mare-grid" id="mare-grid"></div>
      <div class="mare-nota" id="mare-nota">As piscinas naturais aparecem na maré baixa — o melhor momento para o banho.</div>
    </div>
    <div class="mare-fonte" id="mare-fonte">Referência Marinha do Brasil · não use para navegação</div>
  </section>

  <!-- 3 · TEMPO -->
  <section class="card dark" id="c-tempo">
    <div class="flor" style="width:34em;height:34em;left:-10em;bottom:-11em;opacity:.05" data-flor></div>
    <div class="tempo-wrap">
      <div class="tempo-agora">
        <div class="eyebrow">O tempo na ilha</div>
        <div class="tempo-main">
          <div class="icon-now" id="tempo-icon"></div>
          <div class="temp-now"><span id="tempo-temp">—</span><span class="deg">°</span></div>
        </div>
        <div class="temp-cond" id="tempo-cond">—</div>
        <div class="temp-frase" id="tempo-frase"></div>
        <div class="temp-meta" id="tempo-meta"></div>
      </div>
      <div class="tempo-fc">
        <div class="eyebrow">Próximos dias</div>
        <div class="forecast" id="forecast"></div>
      </div>

  </section>

  <!-- 4 · A ILHA HOJE -->
  <section class="card cream editorial" id="c-ilha">
    <div class="ed-bg"></div><div class="ed-ov"></div>
    <div class="ed-content">
      <div class="eyebrow">Para o seu dia</div>
      <div class="titulo" id="ilha-titulo">—</div>
      <div class="corpo" id="ilha-corpo">—</div>
    </div>
  </section>

  <!-- 5 · ALMA BAIANA -->
  <section class="card dark editorial" id="c-baiana">
    <div class="ed-bg"></div><div class="ed-ov"></div>
    <div class="ed-content">
      <div class="eyebrow">Alma da casa</div>
      <div class="titulo" id="baiana-titulo">—</div>
      <div class="corpo" id="baiana-corpo">—</div>
    </div>
  </section>

  <!-- Cards de FOTO são criados via JS -->

  <div class="dots" id="dots"></div>
</div>

<script>
/* =========================================================
   CONFIG  —  é aqui que você mexe
   ========================================================= */
const CONFIG = {
  lat:-13.3817, lng:-38.9139, tz:'America/Bahia',
  cardSeconds:11,

  demoMode:false,
  demoWeather:{ temp:28, code:2, humidity:78, wind:14,
    daily:[ {code:1,max:29,min:24}, {code:2,max:28,min:24}, {code:80,max:27,min:23} ] },

  tideApiKey:'',
  tideFallback:[
    {type:'low', time:'04:50', height:0.3},
    {type:'high',time:'11:05', height:2.1},
    {type:'low', time:'17:18', height:0.4},
    {type:'high',time:'23:30', height:2.0}

function nowParts(){
  const f=new Intl.DateTimeFormat('pt-BR',{timeZone:CONFIG.tz,hour:'2-digit',minute:'2-digit',hour12:false});
  const d=new Intl.DateTimeFormat('pt-BR',{timeZone:CONFIG.tz,weekday:'long',day:'numeric',month:'long'});
  const h=parseInt(new Intl.DateTimeFormat('en-US',{timeZone:CONFIG.tz,hour:'2-digit',hour12:false}).format(new Date()),10);
  return {hm:f.format(new Date()), data:d.format(new Date()), hour:h};
}
function tickClock(){
  const p=nowParts();
  document.getElementById('clock').textContent=p.hm+'  ·  '+p.data;
  document.getElementById('saudacao').textContent = p.hour<12?'Bom dia':(p.hour<18?'Boa tarde':'Boa noite');
}

/* =========================================================
   MARÉ
   ========================================================= */
function renderTide(list){
  document.getElementById('mare-grid').innerHTML=list.map(t=>{
    const alta=t.type==='high';
    return `<div class="mare-col">
      <div class="mare-tag"><span class="arrow">${alta?'↑':'↓'}</span>${alta?'Preia-mar':'Baixa-mar'}</div>
      <div class="mare-hora">${t.time}</div>
      <div class="mare-alt">${t.height.toFixed(1).replace('.',',')} m</div></div>`;
  }).join('');
  const low=list.find(t=>t.type==='low');
  if(low) document.getElementById('mare-nota').textContent=
    `Maré baixa às ${low.time} — as piscinas naturais se abrem para o banho.`;
}
async function loadTide(){
  if(!CONFIG.tideApiKey){ renderTide(CONFIG.tideFallback); return; }
  try{
    const s=new Date();s.setHours(0,0,0,0);const e=new Date();e.setHours(23,59,0,0);
    const url=`https://api.stormglass.io/v2/tide/extremes/point?lat=${CONFIG.lat}&lng=${CONFIG.lng}&start=${s.toISOString()}&end=${e.toISOString()}`;
    const r=await fetch(url,{headers:{Authorization:CONFIG.tideApiKey}});
    const j=await r.json();
    const list=(j.data||[]).map(x=>({type:x.type,height:Math.abs(x.height),
      time:new Intl.DateTimeFormat('pt-BR',{timeZone:CONFIG.tz,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(x.time))}));
    renderTide(list.length?list:CONFIG.tideFallback);
    if(list.length) document.getElementById('mare-fonte').textContent='Fonte: Stormglass · não use para navegação';
  }catch(e){ renderTide(CONFIG.tideFallback); }
}

/* =========================================================
   TEMPO
   ========================================================= */
function tempoFrase(code){
  if([0,1].includes(code)) return 'Dia aberto — o mar chama.';
  if(code===2) return 'Sol entre nuvens, luz macia.';
  if([3,45,48].includes(code)) return 'Céu fechado, tarde de sombra.';
  if([51,53,55,61,63,65,66,67,80,81,82].includes(code)) return 'Chuva passageira — bom para um café.';
  if([95,96,99].includes(code)) return 'Tempo instável, mar agitado.';
  return '';
}
function renderWeather(d){
  const [cond,ic]=wmo(d.code);
  document.getElementById('tempo-temp').textContent=Math.round(d.temp);
  document.getElementById('tempo-cond').textContent=cond;
  document.getElementById('tempo-frase').textContent=tempoFrase(d.code);
  document.getElementById('tempo-meta').textContent=
    `Umidade ${d.humidity}%      ·      Vento ${Math.round(d.wind)} km/h`;
  document.getElementById('tempo-icon').innerHTML=ICONS[ic];
  const dias=['dom','seg','ter','qua','qui','sex','sáb'];
  document.getElementById('forecast').innerHTML=d.daily.map((day,i)=>{
    const dt=new Date();dt.setDate(dt.getDate()+i+1);
    const [,ici]=wmo(day.code);
    return `<div class="fc"><div class="fc-dia">${dias[dt.getDay()]}</div>
      <div class="fc-ico">${ICONS[ici]}</div>
      <div class="fc-temp"><span>${Math.round(day.max)}°</span><span class="min">${Math.round(day.min)}°</span></div></div>`;
  }).join('');
}
async function loadWeather(){
  if(CONFIG.demoMode) return;
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.lat}&longitude=${CONFIG.lng}`
      +`&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m`
      +`&daily=weather_code,temperature_2m_max,temperature_2m_min`
      +`&timezone=${encodeURIComponent(CONFIG.tz)}&forecast_days=4`;
    const r=await fetch(url);const j=await r.json();const c=j.current;
    const daily=[];for(let i=1;i<j.daily.time.length;i++)daily.push(
      {code:j.daily.weather_code[i],max:j.daily.temperature_2m_max[i],min:j.daily.temperature_2m_min[i]});
    renderWeather({temp:c.temperature_2m,code:c.weather_code,humidity:c.relative_humidity_2m,wind:c.wind_speed_10m,daily});
  }catch(e){}
}

  {t:'Pôr do sol na Toca do Morcego',c:'O ponto clássico para ver o sol cair no Atlântico. Chegue com tempo — enche cedo.', img:'ilha-pordosol.jpg', tone:'pordosol'},

const BAIANA=[
  {t:'O samba de roda',c:'Patrimônio do Recôncavo, o samba de roda é a batida que atravessa a Bahia. A recepção sabe onde a roda acontece esta semana.', img:'baiana-samba.jpg', tone:'flor'},
  {t:'O hibisco',c:'A flor que aparece pela casa não é enfeite: é o hibisco baiano, vermelho e franco, como a luz da tarde aqui.', img:'baiana-hibisco.jpg', tone:'flor'},
  {t:'Acarajé ao entardecer',c:'Dendê, camarão e pimenta a gosto. Um ritual baiano que pede pressa nenhuma — pergunte pelos endereços de confiança.', img:'baiana-acaraje.jpg', tone:'pordosol'},
  {t:'Ser recebido pelo nome',c:'Aqui, hóspede não é número de quarto. É a diferença entre ser gerenciado e ser reconhecido.', img:'baiana-anfitria.jpg', tone:'casa'}
];
let iIlha=0,iBaiana=0;
function setEditorial(cardId, item, titleId, bodyId){
  const card=document.getElementById(cardId);
  document.getElementById(titleId).textContent=item.t;
  document.getElementById(bodyId).textContent=item.c;
  const bg=card.querySelector('.ed-bg');
  if(item.img){
    bg.style.backgroundImage=`url('${item.img}'), ${toneBg(item.tone)}`;
    card.classList.add('has-photo');
  }else{
    bg.style.backgroundImage='';
    card.classList.remove('has-photo');
  }
}
function rotateIlha(){ setEditorial('c-ilha', ILHA[iIlha++%ILHA.length], 'ilha-titulo','ilha-corpo'); }
function rotateBaiana(){ setEditorial('c-baiana', BAIANA[iBaiana++%BAIANA.length], 'baiana-titulo','baiana-corpo'); }

/* =========================================================
   FOTOS → cards
   ========================================================= */
function buildPhotos(){
  const stage=document.getElementById('stage');
  const dots=document.getElementById('dots');
  const ids=[];
  CONFIG.photos.forEach((p,i)=>{
    const id='c-foto-'+i;
    const sec=document.createElement('section');
    sec.className='card photo-card';sec.id=id;
    sec.innerHTML=`
      <div class="photo-bg" style="background-image:url('${p.src}'), ${toneBg(p.tone)}"></div>
      <div class="photo-ov"></div>
      <div class="photo-cap">
        ${p.eyebrow?`<div class="eyebrow">${p.eyebrow}</div>`:''}
        ${p.frase?`<div class="frase">${p.frase}</div>`:''}
      </div>`;
    stage.insertBefore(sec,dots);
    ids.push(id);
  });
  return ids;
}

/* =========================================================
   CICLO
   ========================================================= */
let ORDER=[];
const DARK_INFO={'c-abertura':1,'c-tempo':1,'c-baiana':1};
const isDark=id=>id.indexOf('c-foto-')===0||DARK_INFO[id]
  ||document.getElementById(id).classList.contains('has-photo');
let idx=0,dotsEl;

function show(i){
  ORDER.forEach((id,k)=>{
    document.getElementById(id).classList.toggle('active',k===i);
    dotsEl.children[k].classList.toggle('on',k===i);
  });
  const id=ORDER[i];
  if(id==='c-ilha')rotateIlha();
  if(id==='c-baiana')rotateBaiana();
  document.getElementById('topbar').className='topbar '+(isDark(id)?'on-dark':'on-light');
}
function advance(){ idx=(idx+1)%ORDER.length; show(idx); }

/* =========================================================
   INIT
   ========================================================= */
function boot(){
  document.querySelectorAll('[data-flor]').forEach(el=>el.innerHTML=FLOR_SVG);

  const INFO=['c-abertura','c-mare','c-tempo','c-ilha','c-baiana'];
  const fotos=buildPhotos();
  ORDER=[];let p=0;
  INFO.forEach(id=>{ORDER.push(id); if(p<fotos.length)ORDER.push(fotos[p++]);});
  while(p<fotos.length)ORDER.push(fotos[p++]);

  dotsEl=document.getElementById('dots');dotsEl.innerHTML='';
  ORDER.forEach((_,i)=>{const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');dotsEl.appendChild(d);});

  tickClock(); setInterval(tickClock,30000);
  renderWeather(CONFIG.demoWeather);
  loadWeather(); setInterval(loadWeather,3600000);
  loadTide();   setInterval(loadTide,6*3600000);
  rotateIlha(); rotateBaiana();

  show(0);
  setInterval(advance, CONFIG.cardSeconds*1000);
}
boot();
</script>
